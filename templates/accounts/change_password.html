{% extends 'base.html' %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="page-header"><h2>🔑 Change Password</h2><p>Update your account password</p></div>
<div class="row justify-content-center"><div class="col-md-5">
<div class="card">
  <div class="card-header"><i class="fa fa-key"></i> Change Password</div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" name="old_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password1" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="new_password2" class="form-control" required>
      </div>
      <button type="submit" class="btn-primary-custom w-100"><i class="fa fa-save"></i> Update Password</button>
    </form>
  </div>
</div>
</div></div>
{% endblock %}
